name: Daily Tweet

# GitHub 内蔵の schedule(cron) は混雑時に遅延・スキップが多いため使わない。
# 外部スケジューラ（cron-job.org 等）が 1日3回・定時に workflow_dispatch を叩き、
# slot（morning/noon/evening）を入力として渡してこのワークフローを起動する。
# 起動が多少遅れても、渡された slot に対応する枠が確実に投稿される
# （post_tweet.py が POST_SLOT を最優先し、実行時刻には依存しないため）。
#
# 外部スケジューラからの叩き方（例・REST API）:
#   POST https://api.github.com/repos/monoenceo2026/x-tweet/actions/workflows/daily-tweet.yml/dispatches
#   Authorization: Bearer <fine-grained PAT: Actions=Read and write>
#   Accept: application/vnd.github+json
#   Body: {"ref":"main","inputs":{"slot":"morning"}}   # noon / evening も同様
on:
  workflow_dispatch:
    inputs:
      slot:
        description: "投稿枠（auto=実行時刻から判定 / morning=朝 / noon=昼 / evening=夜）"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "morning"
          - "noon"
          - "evening"

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve slot
        id: slot
        env:
          INPUT_SLOT: ${{ github.event.inputs.slot }}
        run: |
          S="$INPUT_SLOT"
          # auto/未指定なら空にして、post_tweet.py 側で実行時刻から判定させる
          if [ "$S" = "auto" ] || [ -z "$S" ]; then
            S=""
          fi
          echo "post_slot=$S" >> "$GITHUB_OUTPUT"
          echo "POST_SLOT='${S:-（実行時刻から判定）}'（input='${INPUT_SLOT}'）"

      - name: Post tweet
        env:
          POST_SLOT: ${{ steps.slot.outputs.post_slot }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_tweet.py
